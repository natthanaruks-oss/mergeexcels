<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Merge files, combine sheets, and split Excel files directly in your browser." />
  <title>Excel Merge, Combine & Split</title>

  <!-- Excel / ZIP libraries loaded from CDN -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>

  <style>
    :root {
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #172033;
      background: #f4f7fb;
      font-synthesis: none;
    }

    * { box-sizing: border-box; }
    body { margin: 0; min-width: 320px; min-height: 100vh; }
    button, input, select { font: inherit; }
    button { cursor: pointer; }

    .app-shell {
      width: min(1120px, calc(100% - 32px));
      margin: 40px auto 72px;
    }

    .hero { margin-bottom: 22px; }
    .eyebrow {
      display: inline-block;
      margin-bottom: 10px;
      color: #5372e7;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .14em;
    }
    h1 {
      margin: 0;
      font-size: clamp(34px, 6vw, 58px);
      line-height: 1.03;
      letter-spacing: -.04em;
    }
    .hero p { margin: 12px 0 0; color: #6b7280; font-size: 16px; }

    .panel {
      padding: 24px;
      background: #fff;
      border: 1px solid #e5e9f2;
      border-radius: 22px;
      box-shadow: 0 18px 50px rgba(42, 55, 90, .08);
    }

    .tabs {
      display: flex;
      width: fit-content;
      gap: 8px;
      margin-bottom: 22px;
      padding: 5px;
      background: #f2f4f8;
      border-radius: 14px;
    }
    .tabs button {
      padding: 11px 18px;
      color: #657086;
      font-weight: 700;
      background: transparent;
      border: 0;
      border-radius: 10px;
    }
    .tabs button.active {
      color: #172033;
      background: #fff;
      box-shadow: 0 3px 10px rgba(30, 41, 59, .08);
    }

    .dropzone {
      min-height: 190px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 24px;
      text-align: center;
      background: #fbfcff;
      border: 2px dashed #b9c3d8;
      border-radius: 18px;
      transition: .2s;
    }
    .dropzone:hover,
    .dropzone.dragover { border-color: #6f86e8; background: #f7f8ff; }
    .dropzone input { display: none; }
    .dropzone strong { font-size: 18px; }
    .dropzone span { color: #7b8496; }

    .file-list { display: grid; gap: 10px; margin-top: 18px; }
    .file-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 14px 16px;
      border: 1px solid #e8ebf2;
      border-radius: 13px;
    }
    .file-card > div { min-width: 0; display: flex; flex-direction: column; gap: 4px; }
    .file-card strong { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .file-card span { color: #778195; font-size: 13px; white-space: nowrap; }

    .section-block {
      margin-top: 24px;
      padding-top: 22px;
      border-top: 1px solid #edf0f5;
    }
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    h2 { margin: 0 0 14px; font-size: 18px; }
    .text-button { color: #5470de; font-weight: 700; background: transparent; border: 0; }

    .sheet-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 10px;
    }
    .check-card {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px;
      border: 1px solid #e6eaf2;
      border-radius: 12px;
    }
    .check-card > span { min-width: 0; display: flex; flex-direction: column; gap: 3px; }
    .check-card small { overflow: hidden; color: #7b8496; text-overflow: ellipsis; white-space: nowrap; }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }
    .form-grid label { display: flex; flex-direction: column; gap: 8px; font-weight: 700; }
    select {
      width: 100%;
      padding: 12px;
      background: #fff;
      border: 1px solid #d9dfeb;
      border-radius: 11px;
    }

    .options { display: flex; flex-wrap: wrap; gap: 24px; }
    .options label { display: flex; align-items: center; gap: 8px; }

    .action-row {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
      margin-top: 24px;
    }
    .primary {
      padding: 14px 22px;
      color: #fff;
      font-weight: 800;
      background: #5169d8;
      border: 0;
      border-radius: 12px;
      box-shadow: 0 10px 22px rgba(81, 105, 216, .22);
    }
    .primary:disabled { opacity: .5; cursor: not-allowed; }
    .message { color: #465065; font-weight: 650; }
    .message.error { color: #b42318; }
    .hidden { display: none !important; }

    .privacy-note {
      margin-top: 16px;
      color: #7b8496;
      font-size: 13px;
    }

    @media (max-width: 680px) {
      .app-shell { width: min(100% - 20px, 1120px); margin-top: 20px; }
      .panel { padding: 16px; }
      .tabs { width: 100%; }
      .tabs button { flex: 1; padding-inline: 8px; font-size: 13px; }
      .form-grid { grid-template-columns: 1fr; }
      .primary { width: 100%; }
      .file-card { align-items: flex-start; }
    }
  </style>
</head>
<body>
  <main class="app-shell">
    <section class="hero">
      <span class="eyebrow">CLIENT-SIDE EXCEL UTILITY</span>
      <h1>Excel Merge, Combine & Split</h1>
      <p>ประมวลผลภายใน Browser ข้อมูลไม่ถูกอัปโหลดขึ้น Server</p>
    </section>

    <section class="panel">
      <div class="tabs" role="tablist" aria-label="Excel tools">
        <button class="active" data-mode="merge" type="button">Merge Files</button>
        <button data-mode="combine" type="button">Combine Sheets</button>
        <button data-mode="split" type="button">Split File</button>
      </div>

      <label id="dropzone" class="dropzone">
        <input id="fileInput" type="file" accept=".xlsx,.xls,.xlsm,.csv" multiple />
        <strong>เลือกหรือลากไฟล์ Excel มาวาง</strong>
        <span id="fileHint">เลือกได้หลายไฟล์</span>
      </label>

      <div id="fileList" class="file-list"></div>

      <section id="combineSection" class="section-block hidden">
        <div class="section-header">
          <h2>เลือก Sheet ที่ต้องการ Combine</h2>
          <button id="toggleAllSheets" class="text-button" type="button">เลือกทั้งหมด</button>
        </div>
        <div id="sheetGrid" class="sheet-grid"></div>
      </section>

      <section id="splitSection" class="form-grid section-block hidden">
        <label>
          Sheet
          <select id="splitSheet"></select>
        </label>
        <label>
          Split by Column
          <select id="splitColumn">
            <option value="">เลือก Column</option>
          </select>
        </label>
      </section>

      <section id="optionsSection" class="options section-block">
        <label><input id="addSourceFile" type="checkbox" checked /> เพิ่ม Source File</label>
        <label><input id="addSourceSheet" type="checkbox" checked /> เพิ่ม Source Sheet</label>
      </section>

      <div class="action-row">
        <button id="runButton" class="primary" type="button" disabled>Merge &amp; Download</button>
        <div id="message" class="message" role="status" aria-live="polite"></div>
      </div>

      <div class="privacy-note">รองรับ .xlsx, .xls, .xlsm และ .csv โดยไฟล์จะถูกอ่านในอุปกรณ์ของผู้ใช้เท่านั้น</div>
    </section>
  </main>

  <script>
    (() => {
      'use strict';

      let mode = 'merge';
      let loadedFiles = [];
      let busy = false;

      const tabs = [...document.querySelectorAll('[data-mode]')];
      const fileInput = document.getElementById('fileInput');
      const fileHint = document.getElementById('fileHint');
      const dropzone = document.getElementById('dropzone');
      const fileList = document.getElementById('fileList');
      const combineSection = document.getElementById('combineSection');
      const splitSection = document.getElementById('splitSection');
      const optionsSection = document.getElementById('optionsSection');
      const sheetGrid = document.getElementById('sheetGrid');
      const toggleAllSheets = document.getElementById('toggleAllSheets');
      const splitSheet = document.getElementById('splitSheet');
      const splitColumn = document.getElementById('splitColumn');
      const addSourceFile = document.getElementById('addSourceFile');
      const addSourceSheet = document.getElementById('addSourceSheet');
      const runButton = document.getElementById('runButton');
      const message = document.getElementById('message');

      const sanitizeFileName = (value) =>
        String(value ?? '').replace(/[\\/:*?"<>|]/g, '_').trim() || 'blank';

      const escapeHtml = (value) =>
        String(value ?? '')
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#039;');

      const setMessage = (text, isError = false) => {
        message.textContent = text;
        message.classList.toggle('error', isError);
      };

      const setBusy = (value) => {
        busy = value;
        runButton.disabled = value || loadedFiles.length === 0;
        runButton.textContent = value
          ? 'กำลังประมวลผล...'
          : mode === 'merge'
            ? 'Merge & Download'
            : mode === 'combine'
              ? 'Combine & Download'
              : 'Split & Download ZIP';
      };

      const normalizeRows = (rows) =>
        rows.filter((row) => Object.values(row).some((value) => String(value ?? '').trim() !== ''));

      const readRows = (loaded, sheetName) => {
        const sheet = loaded.workbook.Sheets[sheetName];
        if (!sheet) return [];
        return normalizeRows(XLSX.utils.sheet_to_json(sheet, {
          defval: '',
          raw: false,
          blankrows: false
        }));
      };

      const rowsToSheet = (rows) => {
        const headers = [];
        const seen = new Set();

        rows.forEach((row) => {
          Object.keys(row).forEach((key) => {
            if (!seen.has(key)) {
              seen.add(key);
              headers.push(key);
            }
          });
        });

        const aoa = [headers, ...rows.map((row) => headers.map((header) => row[header] ?? ''))];
        return XLSX.utils.aoa_to_sheet(aoa);
      };

      const downloadWorkbook = (rows, fileName, sheetName) => {
        const workbook = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(workbook, rowsToSheet(rows), sheetName.slice(0, 31));
        const output = XLSX.write(workbook, { bookType: 'xlsx', type: 'array' });
        saveAs(new Blob([output], { type: 'application/octet-stream' }), fileName);
      };

      const updateModeUI = () => {
        tabs.forEach((tab) => tab.classList.toggle('active', tab.dataset.mode === mode));
        fileInput.multiple = mode !== 'split';
        fileHint.textContent = mode === 'split' ? 'เลือก 1 ไฟล์' : 'เลือกได้หลายไฟล์';
        combineSection.classList.toggle('hidden', mode !== 'combine' || loadedFiles.length === 0);
        splitSection.classList.toggle('hidden', mode !== 'split' || loadedFiles.length !== 1);
        optionsSection.classList.toggle('hidden', mode === 'split');
        setBusy(false);
      };

      const renderFiles = () => {
        fileList.innerHTML = loadedFiles.map(({ file, workbook }) => `
          <div class="file-card">
            <div>
              <strong title="${escapeHtml(file.name)}">${escapeHtml(file.name)}</strong>
              <span>${(file.size / 1024 / 1024).toFixed(2)} MB</span>
            </div>
            <span>${workbook.SheetNames.length.toLocaleString()} sheets</span>
          </div>
        `).join('');
      };

      const renderSheets = () => {
        sheetGrid.innerHTML = loadedFiles.flatMap((loaded, fileIndex) =>
          loaded.workbook.SheetNames.map((sheetName, sheetIndex) => `
            <label class="check-card">
              <input
                class="sheet-checkbox"
                type="checkbox"
                data-file-index="${fileIndex}"
                data-sheet-index="${sheetIndex}"
                checked
              />
              <span>
                <strong>${escapeHtml(sheetName)}</strong>
                <small title="${escapeHtml(loaded.file.name)}">${escapeHtml(loaded.file.name)}</small>
              </span>
            </label>
          `)
        ).join('');
        updateToggleAllText();
      };

      const updateToggleAllText = () => {
        const boxes = [...document.querySelectorAll('.sheet-checkbox')];
        toggleAllSheets.textContent = boxes.length > 0 && boxes.every((box) => box.checked)
          ? 'ยกเลิกทั้งหมด'
          : 'เลือกทั้งหมด';
      };

      const updateSplitSheets = () => {
        splitSheet.innerHTML = '';
        splitColumn.innerHTML = '<option value="">เลือก Column</option>';

        if (loadedFiles.length !== 1) return;

        loadedFiles[0].workbook.SheetNames.forEach((sheetName) => {
          const option = document.createElement('option');
          option.value = sheetName;
          option.textContent = sheetName;
          splitSheet.appendChild(option);
        });
        updateSplitColumns();
      };

      const updateSplitColumns = () => {
        splitColumn.innerHTML = '<option value="">เลือก Column</option>';
        if (loadedFiles.length !== 1 || !splitSheet.value) return;

        const rows = readRows(loadedFiles[0], splitSheet.value);
        const headers = [];
        const seen = new Set();
        rows.slice(0, 100).forEach((row) => {
          Object.keys(row).forEach((key) => {
            if (!seen.has(key)) {
              seen.add(key);
              headers.push(key);
            }
          });
        });

        headers.forEach((header) => {
          const option = document.createElement('option');
          option.value = header;
          option.textContent = header;
          splitColumn.appendChild(option);
        });
      };

      const loadFiles = async (files) => {
        const accepted = [...files].filter((file) => /\.(xlsx|xls|xlsm|csv)$/i.test(file.name));
        if (!accepted.length) {
          setMessage('กรุณาเลือกไฟล์ Excel หรือ CSV', true);
          return;
        }

        setMessage('กำลังอ่านไฟล์...');
        setBusy(true);
        const selected = mode === 'split' ? accepted.slice(0, 1) : accepted;
        const results = [];
        const failures = [];

        for (let index = 0; index < selected.length; index += 1) {
          const file = selected[index];
          try {
            const data = await file.arrayBuffer();
            const workbook = XLSX.read(data, { type: 'array', cellDates: true });
            results.push({ id: `${Date.now()}-${index}`, file, workbook });
          } catch (error) {
            console.error(error);
            failures.push(file.name);
          }
        }

        loadedFiles = results;
        renderFiles();
        renderSheets();
        updateSplitSheets();
        updateModeUI();

        if (failures.length) {
          setMessage(`อ่านบางไฟล์ไม่สำเร็จ: ${failures.join(', ')}`, true);
        } else {
          setMessage(`อ่านสำเร็จ ${results.length.toLocaleString()} ไฟล์`);
        }
      };

      const handleMerge = () => {
        const outputRows = [];

        loadedFiles.forEach((loaded) => {
          const sheetName = loaded.workbook.SheetNames[0];
          readRows(loaded, sheetName).forEach((row) => {
            outputRows.push({
              ...(addSourceFile.checked ? { Source_File: loaded.file.name } : {}),
              ...(addSourceSheet.checked ? { Source_Sheet: sheetName } : {}),
              ...row
            });
          });
        });

        if (!outputRows.length) throw new Error('ไม่พบข้อมูลในไฟล์ที่เลือก');
        downloadWorkbook(outputRows, 'merged_files.xlsx', 'Merged Data');
        setMessage(`รวมสำเร็จ ${outputRows.length.toLocaleString()} แถว`);
      };

      const handleCombine = () => {
        const selected = [...document.querySelectorAll('.sheet-checkbox:checked')];
        if (!selected.length) throw new Error('กรุณาเลือกอย่างน้อย 1 Sheet');

        const outputRows = [];
        selected.forEach((checkbox) => {
          const loaded = loadedFiles[Number(checkbox.dataset.fileIndex)];
          const sheetName = loaded.workbook.SheetNames[Number(checkbox.dataset.sheetIndex)];

          readRows(loaded, sheetName).forEach((row) => {
            outputRows.push({
              ...(addSourceFile.checked ? { Source_File: loaded.file.name } : {}),
              ...(addSourceSheet.checked ? { Source_Sheet: sheetName } : {}),
              ...row
            });
          });
        });

        if (!outputRows.length) throw new Error('ไม่พบข้อมูลใน Sheet ที่เลือก');
        downloadWorkbook(outputRows, 'combined_sheets.xlsx', 'Combined Sheets');
        setMessage(`Combine สำเร็จ ${outputRows.length.toLocaleString()} แถว`);
      };

      const handleSplit = async () => {
        if (loadedFiles.length !== 1) throw new Error('Split ต้องเลือกไฟล์เดียว');
        if (!splitSheet.value || !splitColumn.value) throw new Error('กรุณาเลือก Sheet และ Column');

        const rows = readRows(loadedFiles[0], splitSheet.value);
        if (!rows.length) throw new Error('ไม่พบข้อมูลใน Sheet ที่เลือก');

        const groups = new Map();
        rows.forEach((row) => {
          const key = String(row[splitColumn.value] ?? '').trim() || 'blank';
          if (!groups.has(key)) groups.set(key, []);
          groups.get(key).push(row);
        });

        const zip = new JSZip();
        const usedNames = new Map();

        groups.forEach((groupRows, key) => {
          const baseName = sanitizeFileName(key);
          const count = (usedNames.get(baseName) || 0) + 1;
          usedNames.set(baseName, count);
          const uniqueName = count === 1 ? baseName : `${baseName}_${count}`;

          const workbook = XLSX.utils.book_new();
          XLSX.utils.book_append_sheet(workbook, rowsToSheet(groupRows), splitSheet.value.slice(0, 31));
          const output = XLSX.write(workbook, { bookType: 'xlsx', type: 'array' });
          zip.file(`${uniqueName}.xlsx`, output);
        });

        const blob = await zip.generateAsync({ type: 'blob' });
        saveAs(blob, `split_by_${sanitizeFileName(splitColumn.value)}.zip`);
        setMessage(`Split สำเร็จ ${groups.size.toLocaleString()} ไฟล์`);
      };

      const run = async () => {
        if (busy || !loadedFiles.length) return;
        setBusy(true);
        setMessage('');

        try {
          if (mode === 'merge') handleMerge();
          else if (mode === 'combine') handleCombine();
          else await handleSplit();
        } catch (error) {
          console.error(error);
          setMessage(error instanceof Error ? error.message : 'เกิดข้อผิดพลาด', true);
        } finally {
          setBusy(false);
        }
      };

      tabs.forEach((tab) => {
        tab.addEventListener('click', () => {
          mode = tab.dataset.mode;
          loadedFiles = [];
          fileInput.value = '';
          fileList.innerHTML = '';
          sheetGrid.innerHTML = '';
          splitSheet.innerHTML = '';
          splitColumn.innerHTML = '<option value="">เลือก Column</option>';
          setMessage('');
          updateModeUI();
        });
      });

      fileInput.addEventListener('change', (event) => loadFiles(event.target.files));
      splitSheet.addEventListener('change', updateSplitColumns);
      runButton.addEventListener('click', run);

      sheetGrid.addEventListener('change', (event) => {
        if (event.target.classList.contains('sheet-checkbox')) updateToggleAllText();
      });

      toggleAllSheets.addEventListener('click', () => {
        const boxes = [...document.querySelectorAll('.sheet-checkbox')];
        const shouldCheck = !boxes.every((box) => box.checked);
        boxes.forEach((box) => { box.checked = shouldCheck; });
        updateToggleAllText();
      });

      ['dragenter', 'dragover'].forEach((eventName) => {
        dropzone.addEventListener(eventName, (event) => {
          event.preventDefault();
          dropzone.classList.add('dragover');
        });
      });

      ['dragleave', 'drop'].forEach((eventName) => {
        dropzone.addEventListener(eventName, (event) => {
          event.preventDefault();
          dropzone.classList.remove('dragover');
        });
      });

      dropzone.addEventListener('drop', (event) => loadFiles(event.dataTransfer.files));

      if (typeof XLSX === 'undefined' || typeof JSZip === 'undefined' || typeof saveAs === 'undefined') {
        setMessage('โหลด Library ไม่สำเร็จ กรุณาตรวจสอบการเชื่อมต่ออินเทอร์เน็ต', true);
      }

      updateModeUI();
    })();
  </script>
</body>
</html>
